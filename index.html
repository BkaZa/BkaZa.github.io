<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BkaZa</title>

  <style>
    :root {
      --bg: #020402;
      --green: #00ff66;
      --green-soft: #9dffc4;
      --green-dim: #3c8f59;
      --terminal-bg: rgba(0, 0, 0, 0.78);
      --terminal-border: rgba(0, 255, 102, 0.52);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family:
        ui-monospace,
        SFMono-Regular,
        Menlo,
        Monaco,
        Consolas,
        "Liberation Mono",
        monospace;
    }

    body {
      overflow: hidden;
    }

    #matrix {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: radial-gradient(circle at center, #061406 0%, #020402 48%, #000 100%);
      z-index: 0;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.18) 42%, rgba(0, 0, 0, 0.82) 100%),
        linear-gradient(rgba(0, 255, 102, 0.028) 50%, transparent 50%);
      background-size: auto, 100% 4px;
      mix-blend-mode: screen;
    }

    main {
      position: relative;
      z-index: 2;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(14px, 4vw, 28px);
    }

    .terminal {
      width: min(790px, 100%);
      max-height: min(660px, calc(100svh - 32px));
      border: 1px solid var(--terminal-border);
      border-radius: 14px;
      overflow: hidden;
      background:
        linear-gradient(rgba(0, 255, 102, 0.035) 50%, transparent 50%),
        var(--terminal-bg);
      background-size: 100% 4px;
      box-shadow:
        0 0 64px rgba(0, 255, 102, 0.20),
        0 0 16px rgba(0, 255, 102, 0.20),
        inset 0 0 28px rgba(0, 255, 102, 0.055);
      backdrop-filter: blur(2px);
      position: relative;
    }

    .terminal::before,
    .terminal::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 3;
    }

    .terminal::before {
      background: rgba(0, 255, 102, 0.12);
      mix-blend-mode: screen;
    }

    .terminal::after {
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.14), transparent),
        repeating-linear-gradient(0deg, transparent 0 2px, rgba(0, 255, 102, 0.08) 2px 4px);
      transform: translateX(-110%);
    }

    .terminal.glitch {
      animation: terminalShake 140ms steps(2, end);
    }

    .terminal.glitch::before {
      opacity: 1;
      animation: flash 140ms steps(2, end);
    }

    .terminal.glitch::after {
      opacity: 1;
      animation: sweep 140ms steps(2, end);
    }

    @keyframes terminalShake {
      0% { transform: translate(0, 0); }
      25% { transform: translate(2px, -1px); }
      50% { transform: translate(-2px, 1px); }
      75% { transform: translate(1px, 1px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes flash {
      0% { opacity: 0.2; }
      100% { opacity: 0; }
    }

    @keyframes sweep {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(110%); }
    }

    .bar {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(0, 255, 102, 0.28);
      background: rgba(0, 0, 0, 0.62);
      color: var(--green-dim);
      font-size: 12px;
      user-select: none;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0, 255, 102, 0.75);
      box-shadow: 0 0 8px rgba(0, 255, 102, 0.2);
      flex: 0 0 auto;
    }

    .title {
      flex: 1;
      text-align: center;
      padding-right: 56px;
      color: var(--green-soft);
      opacity: 0.78;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .screen {
      max-height: calc(min(660px, 100svh - 32px) - 45px);
      overflow: auto;
      padding: clamp(18px, 4vw, 30px);
      font-size: clamp(13px, 2vw, 17px);
      line-height: 1.58;
      white-space: pre-wrap;
      text-shadow: 0 0 9px rgba(0, 255, 102, 0.54);
      scrollbar-color: rgba(0, 255, 102, 0.55) rgba(0, 0, 0, 0.32);
      scrollbar-width: thin;
    }

    .screen::-webkit-scrollbar {
      width: 9px;
    }

    .screen::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.32);
    }

    .screen::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 102, 0.48);
      border-radius: 999px;
    }

    .prompt {
      color: var(--green);
    }

    .answer {
      color: var(--green-soft);
    }

    .muted {
      color: var(--green-dim);
    }

    .danger {
      color: #d8ffe6;
      text-shadow: 0 0 14px rgba(0, 255, 102, 0.95);
    }

    a {
      color: var(--green-soft);
      text-decoration: none;
      border-bottom: 1px dashed rgba(157, 255, 196, 0.62);
    }

    a:hover {
      color: white;
      border-color: white;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
    }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.1em;
      margin-left: 4px;
      background: var(--green);
      vertical-align: -0.2em;
      animation: blink 1s steps(2, start) infinite;
      box-shadow: 0 0 10px rgba(0, 255, 102, 0.95);
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor,
      .terminal.glitch,
      .terminal.glitch::before,
      .terminal.glitch::after {
        animation: none;
      }
    }

    @media (max-width: 520px) {
      body {
        overflow: hidden;
      }

      main {
        align-items: center;
        padding: 12px;
      }

      .terminal {
        border-radius: 10px;
        max-height: calc(100svh - 24px);
      }

      .bar {
        padding: 10px 12px;
      }

      .title {
        text-align: left;
        padding-right: 0;
        font-size: 11px;
      }

      .screen {
        max-height: calc(100svh - 68px);
        padding: 18px;
        font-size: 13px;
        line-height: 1.52;
      }
    }
  </style>
</head>

<body>
  <canvas id="matrix" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <main>
    <section class="terminal" id="terminal" aria-label="A completely unnecessary terminal">
      <div class="bar">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="title">/home/bkaza — production-grade nothingness</span>
      </div>

      <div class="screen" id="screen"></div>
    </section>
  </main>

  <script>
    // Matrix rain background. Very serious. Obviously.
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d", { alpha: false });

    const chars = "01BKAZA{}[]<>/\\$#@!?+-=_ゴミﾊﾞｸﾞ虚無";
    const fontSize = 17;
    let columns = 0;
    let drops = [];

    function setupCanvas() {
      const dpr = Math.max(window.devicePixelRatio || 1, 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      columns = Math.ceil(window.innerWidth / fontSize);
      drops = Array.from({ length: columns }, () => Math.random() * window.innerHeight / fontSize);
    }

    function drawMatrixRain() {
      ctx.fillStyle = "rgba(2, 4, 2, 0.095)";
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      ctx.font = fontSize + "px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";

      for (let i = 0; i < drops.length; i++) {
        const char = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        if (Math.random() > 0.968) {
          ctx.fillStyle = "#d8ffe6";
          ctx.shadowColor = "#00ff66";
          ctx.shadowBlur = 14;
        } else {
          ctx.fillStyle = "#00b84a";
          ctx.shadowBlur = 0;
        }

        ctx.fillText(char, x, y);

        if (y > window.innerHeight && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i] += 0.72 + Math.random() * 0.75;
      }

      requestAnimationFrame(drawMatrixRain);
    }

    setupCanvas();
    drawMatrixRain();

    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(setupCanvas, 120);
    });

    // Terminal nonsense.
    const terminal = document.getElementById("terminal");
    const screen = document.getElementById("screen");

    const identities = [
      "a runtime error with a domain name.",
      "404 in human form.",
      "works on my machine.",
      "professional copy-paste engineer.",
      "undefined is not a person.",
      "probably in production.",
      "temporarily pretending to know Go.",
      "one commit away from disaster.",
      "a bug report that learned HTML.",
      "localhost with trust issues."
    ];

    const identity = identities[Math.floor(Math.random() * identities.length)];

    const lines = [
      { text: "Booting kernel...", className: "muted", delayAfter: 160 },
      { text: "Loading useless modules...", className: "muted", delayAfter: 180 },
      { text: "Decrypting reality...", className: "muted", delayAfter: 260 },
      { text: "Reality check failed. Continuing anyway.", className: "danger", delayAfter: 380 },
      { text: "", delayAfter: 120 },

      { text: "$ whoami", className: "prompt", delayAfter: 180 },
      { text: identity, className: "answer", delayAfter: 360 },
      { text: "", delayAfter: 120 },

      { text: "$ ls", className: "prompt", delayAfter: 160 },
      { text: "nothing", className: "answer", delayAfter: 90 },
      { text: "also nothing", className: "answer", delayAfter: 90 },
      { text: "still nothing", className: "answer", delayAfter: 260 },
      { text: "", delayAfter: 120 },

      { text: "$ cat purpose.txt", className: "prompt", delayAfter: 160 },
      { text: "404: purpose not found", className: "answer", delayAfter: 320 },
      { text: "", delayAfter: 120 },

      { text: "$ sudo make me useful", className: "prompt", delayAfter: 160 },
      { text: "permission denied: usefulness is not installed", className: "answer", delayAfter: 340 },
      { text: "", delayAfter: 120 },

      { text: "$ git status", className: "prompt", delayAfter: 160 },
      { text: "on branch existential-crisis", className: "answer", delayAfter: 90 },
      { text: "nothing to commit, nothing to offer", className: "answer", delayAfter: 340 },
      { text: "", delayAfter: 120 },

      { text: "$ uptime", className: "prompt", delayAfter: 160 },
      { text: "long enough to be irrelevant", className: "answer", delayAfter: 300 },
      { text: "", delayAfter: 120 },

      { text: "$ echo \"welcome\"", className: "prompt", delayAfter: 160 },
      { text: "no.", className: "answer", delayAfter: 340 },
      { text: "", delayAfter: 120 },

      { text: "github: https://github.com/BkaZa", className: "muted", delayAfter: 360 },
      { text: "", delayAfter: 120 },

      { text: "$ logout", className: "prompt", delayAfter: 200 },
      { text: "Segmentation fault (core dumped)", className: "danger", delayAfter: 200 },
      { text: "Connection to reality closed.", className: "muted", delayAfter: 0 }
    ];

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function appendLine(text, className = "") {
      const line = document.createElement("div");
      line.className = className;
      if (text === "github: https://github.com/BkaZa") {
        line.innerHTML = 'github: <a href="https://github.com/BkaZa">github.com/BkaZa</a>';
      } else {
        line.textContent = text;
      }
      screen.appendChild(line);
      screen.scrollTop = screen.scrollHeight;
      return line;
    }

    function appendCursor() {
      const line = document.createElement("div");
      line.className = "prompt";
      line.innerHTML = "$<span class=\"cursor\"></span>";
      screen.appendChild(line);
      screen.scrollTop = screen.scrollHeight;
    }

    async function typeLine(item) {
      const line = document.createElement("div");
      line.className = item.className || "";
      screen.appendChild(line);

      if (!item.text) {
        line.innerHTML = "&nbsp;";
        screen.scrollTop = screen.scrollHeight;
        return;
      }

      for (const char of item.text) {
        line.textContent += char;
        screen.scrollTop = screen.scrollHeight;
        await sleep(8 + Math.random() * 18);
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function runTerminal() {
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (reduceMotion) {
        for (const item of lines) {
          appendLine(item.text, item.className);
        }
        appendCursor();
        return;
      }

      for (const item of lines) {
        await typeLine(item);
        await sleep(item.delayAfter ?? 160);
      }

      appendCursor();
    }

    runTerminal();

    // Cheap glitch. Expensive personality.
    function randomGlitch() {
      terminal.classList.add("glitch");

      if (Math.random() > 0.55) {
        const glitchLine = appendLine("████████████████████████", "danger");
        setTimeout(() => glitchLine.remove(), 120);
      }

      setTimeout(() => terminal.classList.remove("glitch"), 160);

      const next = 12000 + Math.random() * 18000;
      setTimeout(randomGlitch, next);
    }

    setTimeout(randomGlitch, 5500 + Math.random() * 3500);
  </script>
</body>
</html>
